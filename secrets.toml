# .streamlit/secrets.toml
# ─────────────────────────────────────────────────────────────
# OPTION A: Google Service Account (recommended for private sheets)
# ─────────────────────────────────────────────────────────────
# Paste your downloaded service account JSON here as a TOML table.
# Get it from: Google Cloud Console → IAM → Service Accounts → Keys
#
# [gcp_service_account]
# type = "service_account"
# project_id = "your-project-id"
# private_key_id = "abc123"
# private_key = "-----BEGIN RSA PRIVATE KEY-----\n...\n-----END RSA PRIVATE KEY-----\n"
# client_email = "your-sa@your-project.iam.gserviceaccount.com"
# client_id = "123456789"
# auth_uri = "https://accounts.google.com/o/oauth2/auth"
# token_uri = "https://oauth2.googleapis.com/token"
# auth_provider_x509_cert_url = "https://www.googleapis.com/oauth2/v1/certs"
# client_x509_cert_url = "https://www.googleapis.com/robot/v1/metadata/x509/your-sa%40your-project.iam.gserviceaccount.com"

# ─────────────────────────────────────────────────────────────
# OPTION B: Public Sheet (no secrets needed)
# ─────────────────────────────────────────────────────────────
# If your sheet is shared as "Anyone with the link → Viewer",
# NO secrets are needed. The app uses the public CSV export API.
# Just leave this file empty or with these comments.
